<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>for someone🌸</title>
  <style>
    body {
      background-image: url("cover.png");
      margin: 0;
      font-family: 'Comic Sans MS', cursive;
      background: linear-gradient(135deg, #ffd6e0,  #fffefe, #d6f0ff);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;}

    .card {
      background: #ffffff;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px #0000001a;
      text-align: center;
      width: 300px;
      animation: float 3s ease-in-out infinite;
    }

    h1 {
      color: #ff6f91;
    }

    p {
      color: #555;
    }

    button {
      background: #ffb6c1;
      border: none;
      padding: 10px 20px;
      border-radius: 15px;
      cursor: pointer;
      font-size: 16px;
      transition: 0.3s;
    }

    button:hover {
      background: #ff91ac;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
  </style>
</head>
<body>

<div class="card">
